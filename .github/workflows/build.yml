name: Build TaskFlow IPA

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project from project.yml
        run: xcodegen generate

      - name: Build unsigned .app for a real device
        run: |
          xcodebuild \
            -project TaskFlow.xcodeproj \
            -scheme TaskFlow \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath build \
            clean build

      - name: Package into an unsigned IPA
        run: |
          mkdir -p Payload
          cp -r "build/Build/Products/Release-iphoneos/TaskFlow.app" Payload/
          zip -r TaskFlow-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskFlow-unsigned-ipa
          path: TaskFlow-unsigned.ipa
